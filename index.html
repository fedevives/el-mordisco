<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animación de Texto</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    position:relative;
    width:100%;
    text-align:center;
}

.text{
    position:absolute;
    width:100%;
    color:#ff0000;
    font-size:5rem;
    font-weight:bold;
    opacity:0;
    text-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff0000;
    animation: fade 6s infinite;
}

.text:nth-child(2){
    animation-delay:3s;
}

@keyframes fade{
    0%{
        opacity:0;
        transform:scale(.9);
    }
    15%{
        opacity:1;
        transform:scale(1);
    }
    40%{
        opacity:1;
        transform:scale(1);
    }
    55%{
        opacity:0;
        transform:scale(1.1);
    }
    100%{
        opacity:0;
    }
}
</style>

</head>
<body>

<div class="container">
    <div class="text">EL MORDISCO</div>
    <div class="text">PORFAVOR PAGUENME</div>
</div>

</body>
</html>
